<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>操作系统进程调度算法演示 | 交互式动画游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Consolas', monospace;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #94a3b8;
            margin-top: 8px;
        }

        /* 主布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        /* 控制面板 */
        .control-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f1f5f9;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #3b82f6;
        }

        /* 算法选择器 */
        .algo-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .algo-btn {
            padding: 10px 8px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
        }

        .algo-btn:hover {
            background: #334155;
        }

        .algo-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        /* 时间片设置 */
        .quantum-setting {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .quantum-setting.visible {
            display: block;
        }

        .quantum-setting label {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .quantum-input {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .quantum-input input {
            flex: 1;
            padding: 8px 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        /* 进程列表 */
        .process-list {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .process-item {
            background: #0f172a;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .process-name {
            width: 40px;
            font-weight: bold;
            color: #60a5fa;
        }

        .process-inputs {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        .process-inputs input {
            width: 70px;
            padding: 6px 8px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 0.8rem;
            text-align: center;
        }

        .remove-btn {
            background: #dc2626;
            border: none;
            border-radius: 8px;
            width: 28px;
            height: 28px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .run-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .run-btn:active {
            transform: scale(0.98);
        }

        /* 可视化区域 */
        .visual-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
        }

        /* 动画区域 */
        .animation-area {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 280px;
        }

        .gantt-title {
            color: #94a3b8;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .gantt-chart {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            min-height: 100px;
            gap: 4px;
        }

        .gantt-block {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            min-width: 50px;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* CPU 动画 */
        .cpu-animation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 16px;
        }

        .cpu-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: pulse 1s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(59,130,246,0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .running-process {
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 40px;
            color: #fbbf24;
            font-weight: bold;
        }

        /* 统计表格 */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .stats-table th, .stats-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #334155;
            color: #cbd5e6;
            font-size: 0.85rem;
        }

        .stats-table th {
            color: #60a5fa;
            font-weight: 500;
        }

        .avg-info {
            margin-top: 15px;
            padding: 12px;
            background: #0f172a;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
        }

        .avg-item {
            text-align: center;
        }

        .avg-label {
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .avg-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fbbf24;
        }

        /* 算法说明 */
        .algo-explanation {
            margin-top: 20px;
            padding: 16px;
            background: #0f172a;
            border-radius: 16px;
            border-left: 4px solid #3b82f6;
        }

        .algo-explanation h4 {
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .algo-explanation p {
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ 操作系统进程调度算法演示</h1>
            <p>时间片轮转(RR) | 先来先服务(FCFS) | 短作业优先(SJF) | 优先级调度</p>
        </div>

        <div class="main-grid">
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <div class="panel-title">🎮 调度算法</div>
                <div class="algo-selector">
                    <div class="algo-btn" data-algo="rr">🔄 RR (时间片轮转)</div>
                    <div class="algo-btn" data-algo="fcfs">📝 FCFS</div>
                    <div class="algo-btn" data-algo="sjf">⚡ SJF</div>
                    <div class="algo-btn" data-algo="priority">⭐ 优先级</div>
                </div>

                <div class="quantum-setting" id="quantumSetting">
                    <label>⏱️ 时间片大小 (Time Quantum)</label>
                    <div class="quantum-input">
                        <input type="number" id="timeQuantum" value="20" min="5" max="100" step="5">
                        <span>ms</span>
                    </div>
                </div>

                <div class="panel-title">📊 进程列表</div>
                <div class="process-list" id="processList"></div>
                <button class="add-btn" id="addProcessBtn">+ 添加进程</button>
                <button class="run-btn" id="runBtn">▶ 开始调度演示</button>
            </div>

            <!-- 右侧可视化区域 -->
            <div class="visual-panel">
                <!-- CPU 动画区 -->
                <div class="cpu-animation" id="cpuAnimation">
                    <div class="cpu-box">🖥️</div>
                    <div class="running-process" id="runningProcess">等待调度</div>
                </div>

                <!-- 甘特图区 -->
                <div class="animation-area">
                    <div class="gantt-title">📈 调度甘特图 (Gantt Chart)</div>
                    <div id="ganttChart" class="gantt-chart">
                        <div style="color: #64748b; text-align: center; width: 100%;">点击"开始调度"查看结果</div>
                    </div>
                </div>

                <!-- 统计表格 -->
                <div id="statsArea">
                    <table class="stats-table" id="statsTable">
                        <thead>
                            <tr><th>进程</th><th>到达时间</th><th>服务时间</th><th>完成时间</th><th>周转时间</th><th>等待时间</th></tr>
                        </thead>
                        <tbody id="statsBody">
                            <tr><td colspan="6" style="text-align: center;">暂无数据</td></tr>
                        </tbody>
                    </table>
                    <div class="avg-info" id="avgInfo">
                        <div class="avg-item"><div class="avg-label">平均周转时间</div><div class="avg-value">--</div></div>
                        <div class="avg-item"><div class="avg-label">平均等待时间</div><div class="avg-value">--</div></div>
                    </div>
                </div>

                <!-- 算法说明 -->
                <div class="algo-explanation" id="algoExplanation">
                    <h4>🔄 时间片轮转 (RR) 算法说明</h4>
                    <p>每个进程被分配一个固定的时间片，按顺序在就绪队列中循环执行。如果进程在时间片内未完成，则被放回队列末尾。这种算法保证了公平性，响应时间短，适合分时系统。</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 进程数据结构
        let processes = [
            { id: 'P1', arrival: 0, burst: 24, priority: 3, originalBurst: 24 },
            { id: 'P2', arrival: 0, burst: 3, priority: 1, originalBurst: 3 },
            { id: 'P3', arrival: 0, burst: 3, priority: 2, originalBurst: 3 }
        ];

        let currentAlgorithm = 'rr';
        let timeQuantum = 20;
        let animationTimer = null;
        let currentScheduleIndex = 0;
        let scheduleData = [];

        // 颜色映射
        const colors = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#ec489a', '#14b8a6', '#f97316'];

        // 渲染进程列表
        function renderProcessList() {
            const container = document.getElementById('processList');
            container.innerHTML = '';
            processes.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = 'process-item';
                div.innerHTML = `
                    <div class="process-name">${p.id}</div>
                    <div class="process-inputs">
                        <input type="number" value="${p.arrival}" placeholder="到达" step="1" data-idx="${idx}" data-field="arrival" style="width:60px">
                        <input type="number" value="${p.burst}" placeholder="服务" step="1" data-idx="${idx}" data-field="burst" style="width:60px">
                        <input type="number" value="${p.priority}" placeholder="优先级" step="1" data-idx="${idx}" data-field="priority" style="width:60px">
                    </div>
                    <button class="remove-btn" data-idx="${idx}">✖</button>
                `;
                container.appendChild(div);
            });

            // 绑定输入事件
            document.querySelectorAll('.process-inputs input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const idx = parseInt(input.dataset.idx);
                    const field = input.dataset.field;
                    let val = parseInt(input.value);
                    if (isNaN(val)) val = 0;
                    if (field === 'burst') val = Math.max(1, val);
                    if (field === 'priority') val = Math.max(1, val);
                    processes[idx][field] = val;
                    if (field === 'burst') processes[idx].originalBurst = val;
                });
            });

            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    if (processes.length > 1) {
                        processes.splice(idx, 1);
                        renderProcessList();
                    }
                });
            });
        }
        // 添加进程
        document.getElementById('addProcessBtn').addEventListener('click', () => {
            const newId = `P${processes.length + 1}`;
            processes.push({
                id: newId,
                arrival: 0,
                burst: 10,
                priority: 3,
                originalBurst: 10
            });
            renderProcessList();
        });
        // 算法切换
        document.querySelectorAll('.algo-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentAlgorithm = btn.dataset.algo;
                
                const quantumSetting = document.getElementById('quantumSetting');
                if (currentAlgorithm === 'rr') {
                    quantumSetting.classList.add('visible');
                } else {
                    quantumSetting.classList.remove('visible');
                }
                updateExplanation();
            });
        });

        document.getElementById('timeQuantum').addEventListener('change', (e) => {
            timeQuantum = parseInt(e.target.value) || 20;
        });

        function updateExplanation() {
            const explanations = {
                rr: { title: '🔄 时间片轮转 (RR)', desc: '每个进程被分配固定时间片，循环执行。公平性好，响应时间短，适合分时系统。' },
                fcfs: { title: '📝 先来先服务 (FCFS)', desc: '按到达顺序执行，非抢占式。实现简单，但可能导致护航效应。' },
                sjf: { title: '⚡ 短作业优先 (SJF)', desc: '选择预计执行时间最短的进程先执行。平均等待时间最小，但可能产生饥饿。' },
                priority: { title: '⭐ 优先级调度', desc: '优先级高的进程先执行。可抢占或非抢占，需注意低优先级进程饥饿问题。' }
            };
            const exp = explanations[currentAlgorithm] || explanations.rr;
            document.getElementById('algoExplanation').innerHTML = `<h4>${exp.title}</h4><p>${exp.desc}</p>`;
        }

        // ========== 调度算法实现 ==========
        function scheduleRR(processesCopy, quantum) {
            const processes = processesCopy.map(p => ({ ...p, remaining: p.burst }));
            const result = [];
            let currentTime = 0;
            let queue = [];
            let completed = 0;
            const n = processes.length;
            
            processes.sort((a, b) => a.arrival - b.arrival);
            let idx = 0;
            
            while (completed < n) {
                while (idx < n && processes[idx].arrival <= currentTime) {
                    queue.push(processes[idx]);
                    idx++;
                }
                
                if (queue.length === 0) {
                    if (idx < n) {
                        result.push({ process: 'IDLE', start: currentTime, end: processes[idx].arrival });
                        currentTime = processes[idx].arrival;
                    }
                    continue;
                }
                
                const p = queue.shift();
                const execTime = Math.min(quantum, p.remaining);
                const start = currentTime;
                const end = currentTime + execTime;
                result.push({ process: p.id, start, end, priority: p.priority });
                currentTime = end;
                p.remaining -= execTime;
                
                while (idx < n && processes[idx].arrival <= currentTime) {
                    queue.push(processes[idx]);
                    idx++;
                }
                
                if (p.remaining > 0) {
                    queue.push(p);
                } else {
                    completed++;
                    p.completion = currentTime;
                    p.turnaround = p.completion - p.arrival;
                    p.waiting = p.turnaround - p.burst;
                }
            }
            return { schedule: result, processes };
        }

        function scheduleFCFS(processesCopy) {
            const processes = processesCopy.map(p => ({ ...p }));
            processes.sort((a, b) => a.arrival - b.arrival);
            const result = [];
            let currentTime = 0;
            
            for (const p of processes) {
                if (currentTime < p.arrival) {
                    result.push({ process: 'IDLE', start: currentTime, end: p.arrival });
                    currentTime = p.arrival;
                }
                const start = currentTime;
                const end = currentTime + p.burst;
                result.push({ process: p.id, start, end });
                currentTime = end;
                p.completion = currentTime;
                p.turnaround = p.completion - p.arrival;
                p.waiting = p.turnaround - p.burst;
            }
            return { schedule: result, processes };
        }

        function scheduleSJF(processesCopy) {
            const processes = processesCopy.map(p => ({ ...p, remaining: p.burst }));
            const result = [];
            let currentTime = 0;
            let completed = 0;
            const n = processes.length;
            let readyQueue = [];
            
            while (completed < n) {
                for (const p of processes) {
                    if (p.arrival <= currentTime && !p.completed && !readyQueue.includes(p)) {
                        readyQueue.push(p);
                    }
                }
                
                if (readyQueue.length === 0) {
                    let nextArrival = Infinity;
                    for (const p of processes) {
                        if (!p.completed && p.arrival < nextArrival) nextArrival = p.arrival;
                    }
                    if (nextArrival !== Infinity) {
                        result.push({ process: 'IDLE', start: currentTime, end: nextArrival });
                        currentTime = nextArrival;
                    }
                    continue;
                }
                
                readyQueue.sort((a, b) => a.remaining - b.remaining);
                const p = readyQueue.shift();
                const start = currentTime;
                const end = currentTime + p.remaining;
                result.push({ process: p.id, start, end });
                currentTime = end;
                p.completed = true;
                p.completion = currentTime;
                p.turnaround = p.completion - p.arrival;
                p.waiting = p.turnaround - p.burst;
                completed++;
            }
            return { schedule: result, processes };
        }

        function schedulePriority(processesCopy) {
            const processes = processesCopy.map(p => ({ ...p, remaining: p.burst }));
            const result = [];
            let currentTime = 0;
            let completed = 0;
            const n = processes.length;
            
            while (completed < n) {
                const readyQueue = [];
                for (const p of processes) {
                    if (p.arrival <= currentTime && !p.completed) readyQueue.push(p);
                }
                
                if (readyQueue.length === 0) {
                    let nextArrival = Infinity;
                    for (const p of processes) {
                        if (!p.completed && p.arrival < nextArrival) nextArrival = p.arrival;
                    }
                    if (nextArrival !== Infinity) {
                        result.push({ process: 'IDLE', start: currentTime, end: nextArrival });
                        currentTime = nextArrival;
                    }
                    continue;
                }
                
                readyQueue.sort((a, b) => a.priority - b.priority);
                const p = readyQueue.shift();
                const start = currentTime;
                const end = currentTime + p.remaining;
                result.push({ process: p.id, start, end });
                currentTime = end;
                p.completed = true;
                p.completion = currentTime;
                p.turnaround = p.completion - p.arrival;
                p.waiting = p.turnaround - p.burst;
                completed++;
            }
            return { schedule: result, processes };
        }

        // 渲染甘特图
        function renderGantt(schedule) {
            const container = document.getElementById('ganttChart');
            container.innerHTML = '';
            
            for (const block of schedule) {
                const duration = block.end - block.start;
                const width = Math.max(45, duration * 2.5);
                const color = block.process === 'IDLE' ? '#334155' : colors[parseInt(block.process.slice(1)) % colors.length];
                const div = document.createElement('div');
                div.className = 'gantt-block';
                div.style.backgroundColor = color;
                div.style.width = `${width}px`;
                div.innerHTML = `${block.process}<br><span style="font-size:9px;">${block.start}→${block.end}</span>`;
                container.appendChild(div);
            }
            
            // 保存调度数据用于动画
            scheduleData = schedule;
            currentScheduleIndex = 0;
            startAnimation();
        }

        // CPU 动画
        function startAnimation() {
            if (animationTimer) clearInterval(animationTimer);
            
            function animateStep() {
                if (currentScheduleIndex < scheduleData.length) {
                    const block = scheduleData[currentScheduleIndex];
                    if (block.process !== 'IDLE') {
                        document.getElementById('runningProcess').innerHTML = `🔄 正在运行: ${block.process} (${block.end - block.start}ms)`;
                    } else {
                        document.getElementById('runningProcess').innerHTML = `⏸️ 空闲等待 (${block.end - block.start}ms)`;
                    }
                    currentScheduleIndex++;
                } else {
                    document.getElementById('runningProcess').innerHTML = '✅ 调度完成';
                    clearInterval(animationTimer);
                }
            }
            
            animateStep();
            animationTimer = setInterval(animateStep, 800);
        }

        // 渲染统计表
        function renderStats(processes) {
            const tbody = document.getElementById('statsBody');
            tbody.innerHTML = '';
            let totalTurnaround = 0, totalWaiting = 0;
            
            for (const p of processes) {
                if (p.completion !== undefined) {
                    totalTurnaround += p.turnaround;
                    totalWaiting += p.waiting;
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.arrival}</td>
                            <td>${p.burst}</td>
                            <td>${p.completion}</td>
                            <td>${p.turnaround}</td>
                            <td>${p.waiting}</td>
                        </tr>
                    `;
                }
            }
            
            const avgTurn = (totalTurnaround / processes.length).toFixed(2);
            const avgWait = (totalWaiting / processes.length).toFixed(2);
            document.getElementById('avgInfo').innerHTML = `
                <div class="avg-item"><div class="avg-label">平均周转时间</div><div class="avg-value">${avgTurn} ms</div></div>
                <div class="avg-item"><div class="avg-label">平均等待时间</div><div class="avg-value">${avgWait} ms</div></div>
            `;
        }

        // 主调度函数
        function runScheduler() {
            const procs = processes.map(p => ({
                id: p.id,
                arrival: p.arrival,
                burst: p.burst,
                priority: p.priority
            }));
            
            let result;
            switch (currentAlgorithm) {
                case 'rr': result = scheduleRR(procs, timeQuantum); break;
                case 'fcfs': result = scheduleFCFS(procs); break;
                case 'sjf': result = scheduleSJF(procs); break;
                case 'priority': result = schedulePriority(procs); break;
                default: result = scheduleRR(procs, timeQuantum);
            }
            
            renderGantt(result.schedule);
            renderStats(result.processes);
        }

        document.getElementById('runBtn').addEventListener('click', runScheduler);

        // 初始化
        renderProcessList();
        document.querySelector('.algo-btn[data-algo="rr"]').classList.add('active');
        document.getElementById('quantumSetting').classList.add('visible');
        updateExplanation();
        
        // 默认运行一次展示
        setTimeout(runScheduler, 200);
    </script>
</body>
</html>
